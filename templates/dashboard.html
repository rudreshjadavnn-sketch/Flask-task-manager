    <html>

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <style>

            body{
                margin: 0;
                padding: 0;
                background-color: rgb(214, 208, 188);
            }

            .header{
                display: flex;
                background: rgb(62, 4, 71);
                padding: 20px;
                justify-content: space-between;
                color: white;
            }

            .result{
                background: none;
                padding: 10px;
                margin-top: 40px;
                border-radius: 10px;
                display: none;
                margin-left:auto;
                margin-right:auto;
                width:90%;
                max-width:1100px;
            }

            #overlay{
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0,0,0,0.4);
                display: none;
                align-items: center;
                justify-content: center;
            }

            .task{
                padding: 20px;
                background: rgb(140, 242, 213);
                display: flex;
                align-items: center;
                justify-content: center;
                flex-direction: column;
                border-radius: 10px;
            }

            input{
                padding: 10px;
                border-radius: 7px;
                border: none;
            }

            button{
                padding: 7px 20px;
                border: none;
                border-radius: 5px;
                cursor: pointer;
            }
           .card{
            background: #ffffff;
            padding: 10px 30px;
            margin-top: 14px;
            border-radius: 15px;
            display: flex;
            justify-content: space-between;align-items: center;
            box-shadow:0 4px 15px rgba(0,0,0,0.06),0 1px 3px rgba(0,0,0,0.04);
            transition: 0.25s ease;
        }
        .card:hover{
            transform: translateY(-3px);
            box-shadow:0 8px 20px rgba(0,0,0,0.08),0 3px 6px rgba(0,0,0,0.05);
        }
        .card h3{
            margin: 0;
            font-size: 25px;
            font-weight: bold;
            color: #111827;
        }

        .card p{
            margin-top: 10px;
            margin-bottom: 0;
            font-size: 18px;
            color: #6b7280;
        }
            .task input{
                padding: 15px;
                border-radius: 10px;
                border: none;
                outline: none;
            }
            .task button{
                color: white;
                background: rgb(74, 79, 228);
            }
            .card-btn .btn2{
                background: white;
                color: #ef4444;
                border: 2px solid #ef4444;
                padding: 5px 15px;
                border-radius: 10px;
                font-size: 18px;
                font-weight: 600;
            }
            #noresult{
                display: none;
                align-items: center;
                justify-content: center;
                display: flex;
                width: 100%;
                height: 80%;
            }
            .noresult-text{
                color: rgba(22, 13, 13, 0.562);
                font-size: 30px;
            }
            #welname{
                font-size: 25px;
            }
            .logout-btn{
                color: white;
                background: rgba(255, 0, 0, 0.685);
            }
            #search{
                display: flex;
                justify-content: space-between;
                margin-left: 95px; 
                margin-right: 90px;
                align-items: center;
                display: none;
            }
            #search input{
                width: 100%;
                max-width: 400px;
                padding: 15px;
            }
            #notask{
                display: none;
                justify-content: center;
                align-items: center;
                padding: 20px;
                font-size: 25px;
                color: red;
            }
            .card-btn{
                display: flex;
                gap: 20px;
            }
            .card-btn .btn1{
                background: white;
                color: #2563eb;
                border: 2px solid #2563eb;
                padding: 5px 15px;
                border-radius: 10px;
                font-size: 18px;
                font-weight: 600;
            }
            #overlay1{
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0,0,0,0.4);
                display: none;
                align-items: center;
                justify-content: center;
            }
            .task1{
                padding: 20px;
                background: rgb(140, 242, 213);
                display: flex;
                align-items: center;
                justify-content: center;
                flex-direction: column;
                border-radius: 10px;
            }

            /* ---------------- RESPONSIVE DESIGN ---------------- */

*{
    box-sizing:border-box;
}

img{
    max-width:100%;
}

@media (max-width:1024px){

    .result{
        margin-left:40px;
        margin-right:40px;
    }

    #search{
        margin-left:40px;
        margin-right:40px;
    }

    #search input{
        width:280px;
    }
}

@media (max-width:768px){

    .header{
        flex-direction:column;
        gap:15px;
        align-items:center;
        text-align:center;
    }

    #welname{
        font-size:22px;
    }

    #search{
        flex-direction:column;
        gap:15px;
        margin:20px;
    }

    #search input{
        width:100%;
    }

    .result{
        margin:20px;
    }

    .card{
        flex-direction:column;
        align-items:flex-start;
        gap:15px;
    }

    .card-btn{
        width:100%;
        justify-content:flex-end;
    }

    .task,
    .task1{
        width:90%;
        max-width:420px;
    }

    .task input,
    .task1 input{
        width:100%;
    }

}

@media (max-width:480px){

    body{
        font-size:14px;
    }

    .header{
        padding:15px;
    }

    #welname{
        font-size:18px;
    }

    button{
        width:100%;
    }

    .header button{
        width:100%;
    }

    .card{
        padding:15px;
    }

    .card h3{
        font-size:20px;
    }

    .card p{
        font-size:16px;
    }

    .card-btn{
        width:100%;
        flex-direction:column;
        gap:10px;
    }

    .card-btn .btn1,
    .card-btn .btn2{
        width:100%;
    }

    .task,
    .task1{
        width:95%;
        padding:20px;
    }

    .task input,
    .task1 input{
        width:100%;
    }

    #search{
        margin:15px;
    }

    .result{
        margin:15px;
    }

}

        </style>

    </head>

    <body>

        <div id="overlay">

            <div class="task">

                <div>Add Your Task</div><br>

                <input type="text" placeholder="Enter task name" id="name" required><br>

                <input type="text" placeholder="Enter subject name" id="subj" required><br>

                <button onclick="addtask()">Add Task</button>

            </div>

        </div>
        <div id="overlay1">

            <div class="task1">

                <div>Add Your Task</div><br>

                <input type="text" placeholder="Enter task name" id="name1" required><br>

                <input type="text" placeholder="Enter subject name" id="subj1" required><br>

                <button onclick="updatetask()">Update Task</button>

            </div>

        </div>

        <div class="header">

            <div id="welname"></div>

            <button onclick="taskcard()">Add Tasks</button>
            <button class="logout-btn" onclick="logout()">Logout</button>

        </div>

        <br>
        <div id="search">
            <div><h1>Tasks</h1></div>
            <div><input type="text" placeholder="Search tasks" oninput="searchtask()" id="searchinput"></div>
        </div>
        <div class="result" id="resultdiv">
            <div id="notask">No Task Found</div>
        </div>
         <div id="noresult"><div class="noresult-text">No Tasks Added</div></div>

        <script>
            if(!localStorage.getItem("token")){
                window.location.href="/loginpage";
            }
            let currentTaskId = "";

            function taskcard(){

                document.getElementById("overlay").style.display = "flex";
            }

            async function addtask(){
                const data={
                    name: document.getElementById("name").value,
                    subj: document.getElementById("subj").value
                };
                if(data.name=="" || data.subj==""){
                    alert("please enter task name and subject")
                }
                else{
                const response = await fetch("/addtask",
                    {
                        method: "POST",
                        headers: {
                            "content-Type": "application/json",
                            "Authorization": localStorage.getItem("token")
                        },
                        body: JSON.stringify(data)
                    });
                    const result= await response.json();
                    if(result.message=="Task Added"){
                        alert("Task Added");
                        loadtask();
                        document.getElementById("overlay").style.display = "none";
                        document.getElementById("name").value = "";
                        document.getElementById("subj").value = "";
                    }
                    else{
                        alert("Invalid Input")
                    }
                }
            }

            async function loadtask(){
                const response= await fetch("/gettask",{
                    method: "POST",
                    headers:{
                        "content-Type":"application/json",
                         "Authorization": localStorage.getItem("token")
                    },
                });

                const task=await response.json();
                const resultdiv=document.getElementById("resultdiv");
                const noresult=document.getElementById("noresult");
                const searchbar=document.getElementById("search");
                resultdiv.innerHTML=`
                <div id="notask">No Task Found</div>
                `;
                if(task.length > 0){
                    resultdiv.style.display = "block";
                    noresult.style.display = "none";
                    searchbar.style.display = "flex";
                }
                else{
                    resultdiv.style.display = "none";
                    noresult.style.display="flex";
                }
                task.forEach(task => { 
                resultdiv.innerHTML+= `    
                <div class="card">
                    <div>
                    <h3>${task.name}</h3>
                    <p>${task.subj}</p>
                    </div>
                    <div class="card-btn">
                    <div><button class="btn1" type="button" onclick="openupdate('${task.id}')">Update</button></div>
                    <div><button class="btn2" type="button" onclick="deletetask('${task.id}')">Delete</button></div>
                    </div>
                    </div>
                    `;
                });
            }
            async function deletetask(taskid){
                const data={
                    taskid:taskid
                }
                const response=await fetch("/deletetask",{
                    method:"POST",
                    headers:{
                        "content-Type":"application/json",
                        "Authorization": localStorage.getItem("token")
                    },
                    body:JSON.stringify(data)
                });
                const result=await response.json();
                if(result.message == "Task Deleted"){
                    alert("Task Deleted")
                    loadtask();
                }
            }


            async function updatetask(){
                const data={
                    taskid:currentTaskId,
                    name: document.getElementById("name1").value,
                    subj: document.getElementById("subj1").value
                }
                if(data.name=="" || data.subj==""){
                    alert("Please enter task name and subject")
                }
                else{
                const response = await fetch("/updatetask",{
                    method:"POST",
                    headers:{
                        "content-Type":"application/json",
                        "Authorization":localStorage.getItem("token")
                    },
                    body:JSON.stringify(data)
                });
                result= await response.json();
                if(result.message=="Task Updated"){
                    alert("Task Updated");
                    document.getElementById("overlay1").style.display="none";
                    loadtask();
                }
            }

        }
        

            function parseJwt(token){
                return JSON.parse(atob(token.split('.')[1]));
            }
            const token = localStorage.getItem("token");
            const decoded = parseJwt(token);
            document.getElementById("welname").innerHTML = "Welcome " + decoded.name;
            loadtask();

            function searchtask(){
                const search =document.getElementById("searchinput").value.toLowerCase();
                const cards =document.querySelectorAll(".card");
                const notask =document.getElementById("notask");
                let found = false;
                cards.forEach(card => {
                    const taskname =card.querySelector("h3").innerText.toLowerCase();
                    if(taskname.includes(search)){
                        card.style.display = "flex";
                        found = true;
                    }
                    else{
                        card.style.display = "none";
                    }
                });
                if(found){
                    notask.style.display = "none";
                }
                else{
                    notask.style.display = "flex";
                }
            }
            function openupdate(taskid){
                currentTaskId = taskid;
                document.getElementById("overlay1").style.display="flex";
            }

            function logout(){
                localStorage.clear();
                window.location.href="/loginpage";
            }
        </script>

    </body>

    </html>

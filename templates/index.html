    <html>
        <head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            background:#f5f5f5;
            padding:20px;
            font-family:Arial, Helvetica, sans-serif;
        }

        div{
            background:rgb(53,223,197);
            padding:35px;
            border-radius:15px;
            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content:center;
            width:100%;
            max-width:420px;
            box-shadow:0 5px 15px rgba(0,0,0,0.2);
        }

        h1{
            margin-bottom:20px;
        }

        input{
            width:100%;
            padding:15px;
            border-radius:10px;
            border:none;
            outline:none;
            font-size:16px;
        }

        button{
            width:100%;
            padding:15px;
            background:rgb(239,61,249);
            border:none;
            color:white;
            border-radius:10px;
            cursor:pointer;
            font-size:16px;
            font-weight:bold;
        }

        button:hover{
            opacity:0.9;
        }

        p{
            margin-top:20px;
            text-align:center;
        }

        a{
            color:blue;
            text-decoration:none;
            font-weight:bold;
        }

        @media (max-width:768px){

            div{
                padding:30px 20px;
            }

            h1{
                font-size:28px;
            }

        }

        @media (max-width:480px){

            body{
                padding:15px;
            }

            div{
                padding:25px 18px;
                border-radius:12px;
            }

            h1{
                font-size:24px;
            }

            input{
                padding:13px;
                font-size:15px;
            }

            button{
                padding:13px;
                font-size:15px;
            }

            p{
                font-size:14px;
            }

        }

    </style>

</head>
        <body>
            <div>
                <h1>Register</h1><br>
                <input type="text" placeholder="Enter youre name" id="name"><br>
                <input type="email" placeholder="Enter youre email" id="email"><br>
                <input type="password" placeholder="Enter password" id="password"><br><br>
                <button onclick="register()">Register</button><br>
                <p>Already user? <a href="/loginpage">Login</a></p>
            </div>
            <script>
                async function register(){
                    const data={
                        name:document.getElementById("name").value,
                        email:document.getElementById("email").value,
                        password:document.getElementById("password").value
                    };
                    const response=await fetch("/register",
                    {
                        method:"POST",
                        headers:{
                            "content-Type":"application/json"
                        },
                        body:JSON.stringify(data)
                    });
                    const result=await response.json();
                    if(response.ok){
                        localStorage.setItem("email",data.email);
                        localStorage.setItem("name",data.name);
                        alert("Register Success")
                        window.location.href="/loginpage";
                    }
                    else{
                    alert(result.message);
                    }
                }
            </script>
        </body>
    </html>

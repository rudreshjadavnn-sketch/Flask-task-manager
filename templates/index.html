    <html>
        <head>
            <style>
                body{
                    display: flex;
                    justify-content: center;
                    align-items: center;
                }
                div{
                    background: rgb(53, 223, 197);
                    padding: 20px 30px;
                    border-radius: 15px;
                    display: flex;
                    flex-direction: column;
                    align-items: center;
                    justify-content: center;
                    color: black;
                }
                input{
                    padding: 15px;
                    border-radius: 10px;
                    border: none;
                    outline: none;
                    width: 300px;

                }
                button{
                    padding: 10px 25px;
                    background: rgb(239, 61, 249);
                    border: none;
                    color: white;
                    border-radius: 5px;
                    cursor: pointer;
                }
            </style>
        </head>
        <body>
            <div>
                <h1>Register</h1><br>
                <input type="text" placeholder="Enter youre name" id="name"><br>
                <input type="email" placeholder="Enter youre email" id="email"><br>
                <input type="password" placeholder="Enter password" id="password"><br><br>
                <button onclick="register()">Register</button><br>
                <p>Already user? <a href="/loginpage">Login</a></p>
            </div>
            <script>
                async function register(){
                    const data={
                        name:document.getElementById("name").value,
                        email:document.getElementById("email").value,
                        password:document.getElementById("password").value
                    };
                    const response=await fetch("/register",
                    {
                        method:"POST",
                        headers:{
                            "content-Type":"application/json"
                        },
                        body:JSON.stringify(data)
                    });
                    const result=await response.json();
                    if(response.ok){
                        localStorage.setItem("email",data.email);
                        localStorage.setItem("name",data.name);
                        alert("Register Success")
                        window.location.href="/loginpage";
                    }
                    else{
                    alert(result.message);
                    }
                }
            </script>
        </body>
    </html>

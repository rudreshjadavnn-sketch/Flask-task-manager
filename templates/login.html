    <html>
        <head>
            <style>
                body{
                    display: flex;
                    justify-content: center;
                    align-items: center;
                }
                div{
                    background: rgb(53, 223, 197);
                    padding: 20px 30px;
                    border-radius: 15px;
                    display: flex;
                    flex-direction: column;
                    align-items: center;
                    justify-content: center;
                    color: black;
                }
                input{
                    padding: 15px;
                    border-radius: 10px;
                    width: 300px;
                    outline: none;
                    border: none;
                }
                button{
                    padding: 10px 25px;
                    background: rgb(239, 61, 249);
                    border: none;
                    color: white;
                    border-radius: 5px;
                    cursor: pointer;
                }
            </style>
        </head>
        <body>
            <div>
                <h1>Login</h1><br>
                <input type="mail" placeholder="Enter youre email" id="email"><br>
                <input type="password" placeholder="Enter password" id="password"><br><br>
                <button onclick="login()">Login</button>
                <br>
                <p>Not Register? <a href="/">SignUp</a></p>
            </div>
            <script>
                async function login(){
                    data={
                        email:document.getElementById("email").value,
                        password:document.getElementById("password").value
                    };
                    const response = await fetch("http://127.0.0.1:5000/login",
                        {
                            method:"POST",
                            headers:{
                                "content-Type": "application/json"
                            },
                            body:JSON.stringify(data)
                        });
                    const result=await response.json();
                    if(result.meassage=="Login success"){
                        localStorage.setItem("token",result.token);
                        alert("Login Success")
                        window.location.href="/dashboard";
                    }
                    else{
                        alert(result.meassage)
                    }
                }
            </script>
        </body>
    </html>
